name: Daily Report Generator

on:
  schedule:
    # 每天 UTC 0 点 = 北京时间 8 点
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 开启写入权限
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 requests jinja2 Pillow
          
      - name: Generate daily report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_report.py
        
      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }} main