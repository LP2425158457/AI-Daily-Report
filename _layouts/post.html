<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <meta name="description" content="{{ page.description | default: 'AI Daily Report - 每日 AI、科技、加密货币资讯' }}">
    <meta name="author" content="{{ site.author }}">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description | default: 'AI Daily Report' }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    
    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1><a href="{{ '/' | relative_url }}">🤖 AI Daily Report</a></h1>
            <p class="subtitle">每日 AI、科技、加密货币资讯速览</p>
        </div>
    </header>

    <main class="container">
        <article class="post">
            <header class="post-header">
                <h1>{{ page.title }}</h1>
                <time class="post-date" datetime="{{ page.date | date: '%Y-%m-%d' }}">
                    📅 {{ page.date | date: "%Y年%m月%d日" }}
                </time>
            </header>

            <div class="post-content">
                {{ content }}
            </div>
        </article>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© {{ site.time | date: "%Y" }} AI Daily Report | 自动生成于 GitHub Actions</p>
            <p><a href="{{ '/feed.xml' }}">📡 RSS 订阅</a></p>
        </div>
    </footer>
</body>
</html>
