title: AI Daily Report
description: 每日 AI、科技、加密货币资讯速览
baseurl: ""
url: "https://lp2425158457.github.io"
author: AI Daily Report

# Jekyll 配置
markdown: kramdown
highlighter: rouge
timezone: Asia/Shanghai

# Collections
collections:
  posts:
    output: true

# 默认配置
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false

# GitHub Pages 主题
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Feed 配置
feed:
  path: feed.xml